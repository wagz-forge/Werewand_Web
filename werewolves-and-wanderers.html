<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Werewolves and Wanderers</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0a;
    --fg: #c8c8c8;
    --dim: #555;
    --accent: #e8e8e8;
    --danger: #888;
    --btn-bg: #1a1a1a;
    --btn-border: #333;
    --btn-hover: #222;
    --btn-active: #2a2a2a;
    --panel-border: #222;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--fg);
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    line-height: 1.6;
    overflow: hidden;
  }

  #game {
    display: flex;
    height: 100vh;
    width: 100vw;
  }

  /* ── LEFT PANEL: narrative log ── */
  #log-panel {
    flex: 1 1 auto;
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--panel-border);
    min-width: 0;
  }

  #log-header {
    padding: 18px 20px 10px;
    border-bottom: 1px solid var(--panel-border);
    color: var(--dim);
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  #log {
    flex: 1;
    overflow-y: auto;
    padding: 16px 20px;
    scroll-behavior: smooth;
  }

  #log::-webkit-scrollbar { width: 4px; }
  #log::-webkit-scrollbar-track { background: transparent; }
  #log::-webkit-scrollbar-thumb { background: #222; }

  .log-entry {
    margin-bottom: 6px;
    opacity: 0;
    animation: fadeIn 0.4s forwards;
    color: var(--fg);
  }
  .log-entry.dim { color: var(--dim); }
  .log-entry.alert { color: var(--accent); }
  .log-entry.danger { color: #aaa; font-style: italic; }
  .log-entry.separator { color: #222; letter-spacing: 0; }
  .log-entry.big {
    font-size: 16px;
    letter-spacing: 0.08em;
    color: var(--accent);
    margin: 10px 0;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(3px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── ASCII MAP ── */
  #map-section { padding: 14px 18px; border-bottom: 1px solid var(--panel-border); }
  #map-section h3 {
    font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--dim); margin-bottom: 10px;
  }
  #map-legend {
    font-size: 9px; color: var(--dim); margin-bottom: 6px;
    letter-spacing: 0.05em;
  }
  #ascii-map {
    font-size: 9px;
    line-height: 1.45;
    letter-spacing: 0.05em;
    white-space: pre;
    color: var(--dim);
    font-family: 'Share Tech Mono', monospace;
  }
  #ascii-map .r-unvisited { color: #1e1e1e; }
  #ascii-map .r-visited   { color: #555; }
  #ascii-map .r-current   { color: var(--accent); }
  #ascii-map .r-conn      { color: #2a2a2a; }
  #ascii-map .r-conn-vis  { color: #383838; }

  /* ── RIGHT PANEL: status + actions ── */
  #side-panel {
    width: 260px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    overflow-y: auto;
  }

  #side-panel::-webkit-scrollbar { width: 3px; }
  #side-panel::-webkit-scrollbar-thumb { background: #1a1a1a; }

  .side-section {
    padding: 16px 18px;
    border-bottom: 1px solid var(--panel-border);
  }

  .side-section h3 {
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--dim);
    margin-bottom: 10px;
  }

  /* stats */
  .stat-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 5px;
    font-size: 12px;
  }
  .stat-label { color: var(--dim); }
  .stat-value { color: var(--fg); }
  .stat-value.low { color: #888; }
  .stat-value.critical { color: #777; font-weight: bold; }

  /* inventory */
  .inv-item {
    font-size: 12px;
    color: var(--fg);
    margin-bottom: 3px;
    padding-left: 8px;
    position: relative;
  }
  .inv-item::before { content: '·'; position: absolute; left: 0; color: var(--dim); }
  .inv-empty { font-size: 12px; color: var(--dim); font-style: italic; }

  /* room exits */
  .exits-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(3, 24px);
    gap: 2px;
    width: 90px;
    margin: 6px auto;
  }
  .exit-cell {
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; color: var(--dim);
  }
  .exit-btn {
    background: var(--btn-bg);
    border: 1px solid var(--btn-border);
    color: var(--fg);
    font-family: inherit;
    font-size: 10px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.1s, border-color 0.1s;
    letter-spacing: 0.05em;
  }
  .exit-btn:hover { background: var(--btn-hover); border-color: #444; }
  .exit-btn:active { background: var(--btn-active); }
  .exit-btn.unavailable {
    background: transparent; border-color: #1a1a1a;
    color: #1e1e1e; cursor: default;
  }

  /* action buttons */
  .action-btn {
    display: block;
    width: 100%;
    margin-bottom: 5px;
    padding: 7px 10px;
    background: var(--btn-bg);
    border: 1px solid var(--btn-border);
    color: var(--fg);
    font-family: inherit;
    font-size: 11px;
    text-align: left;
    cursor: pointer;
    letter-spacing: 0.04em;
    transition: background 0.1s, border-color 0.1s;
  }
  .action-btn:hover { background: var(--btn-hover); border-color: #444; }
  .action-btn:active { background: var(--btn-active); }
  .action-btn .key {
    color: var(--dim); margin-right: 6px; font-size: 10px;
  }
  .action-btn:disabled {
    color: #333; border-color: #1a1a1a;
    cursor: default; background: transparent;
  }
  .action-btn:disabled .key { color: #2a2a2a; }

  /* INPUT overlay for name / shop / fight */
  #overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.85);
    display: flex; align-items: center; justify-content: center;
    z-index: 100;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s;
  }
  #overlay.visible { opacity: 1; pointer-events: all; }

  #overlay-box {
    border: 1px solid #333;
    background: #0d0d0d;
    padding: 28px 32px;
    width: 380px;
    max-width: 90vw;
  }
  #overlay-title {
    font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--dim); margin-bottom: 18px;
  }
  #overlay-body { margin-bottom: 18px; line-height: 1.8; }
  #overlay-body p { margin-bottom: 6px; font-size: 12px; }
  #overlay-body p.highlight { color: var(--accent); }

  .overlay-input {
    width: 100%;
    background: #111;
    border: none; border-bottom: 1px solid #333;
    color: var(--fg);
    font-family: inherit;
    font-size: 13px;
    padding: 6px 4px;
    outline: none;
    margin-bottom: 14px;
  }
  .overlay-input:focus { border-bottom-color: #666; }

  .overlay-btn {
    background: var(--btn-bg);
    border: 1px solid var(--btn-border);
    color: var(--fg);
    font-family: inherit;
    font-size: 11px;
    padding: 7px 16px;
    cursor: pointer;
    margin-right: 8px;
    letter-spacing: 0.05em;
  }
  .overlay-btn:hover { background: #222; border-color: #444; }

  /* shop item row */
  .shop-item {
    display: flex; justify-content: space-between;
    padding: 5px 0; border-bottom: 1px solid #1a1a1a;
    cursor: pointer; font-size: 12px;
    transition: color 0.1s;
  }
  .shop-item:hover { color: var(--accent); }
  .shop-item .price { color: var(--dim); }
  .shop-item.owned { color: #444; cursor: default; }
  .shop-item.owned .price { color: #333; }

  /* weapon choice */
  .weapon-btn {
    display: block; width: 100%;
    background: #111; border: 1px solid #2a2a2a;
    color: var(--fg); font-family: inherit;
    font-size: 12px; padding: 8px 12px;
    margin-bottom: 6px; cursor: pointer; text-align: left;
  }
  .weapon-btn:hover { background: #1a1a1a; border-color: #444; }

  /* title screen */
  #title-screen {
    position: fixed; inset: 0;
    background: var(--bg);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 200;
  }
  #title-screen h1 {
    font-size: 11px; letter-spacing: 0.4em;
    text-transform: uppercase; color: var(--dim);
    margin-bottom: 6px;
  }
  #title-screen .subtitle {
    font-size: 28px; letter-spacing: 0.12em;
    color: var(--accent); margin-bottom: 4px;
  }
  #title-screen .and {
    font-size: 11px; color: var(--dim);
    letter-spacing: 0.4em; text-transform: uppercase;
    margin-bottom: 6px;
  }
  #title-screen .subtitle2 {
    font-size: 28px; letter-spacing: 0.12em;
    color: var(--accent); margin-bottom: 40px;
  }
  #title-screen .start-btn {
    font-family: inherit;
    font-size: 11px; letter-spacing: 0.2em;
    text-transform: uppercase;
    background: transparent;
    border: 1px solid #333;
    color: var(--dim); padding: 10px 24px;
    cursor: pointer;
    transition: color 0.2s, border-color 0.2s;
  }
  #title-screen .start-btn:hover { color: var(--fg); border-color: #666; }

  /* death / win screens */
  #end-screen {
    position: fixed; inset: 0;
    background: var(--bg);
    display: none;
    flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 300;
  }
  #end-screen.visible { display: flex; }
  #end-msg { font-size: 13px; color: var(--dim); text-align: center; line-height: 2; }
  #end-msg .end-title { font-size: 22px; color: var(--accent); letter-spacing: 0.12em; margin-bottom: 16px; }
  #end-msg .score { color: var(--fg); margin-top: 12px; }
  .restart-btn {
    font-family: inherit;
    font-size: 11px; letter-spacing: 0.2em;
    text-transform: uppercase;
    background: transparent;
    border: 1px solid #333;
    color: var(--dim); padding: 10px 24px;
    cursor: pointer; margin-top: 28px;
    transition: color 0.2s, border-color 0.2s;
  }
  .restart-btn:hover { color: var(--fg); border-color: #666; }

  #room-name {
    font-size: 10px; letter-spacing: 0.2em;
    text-transform: uppercase; color: var(--dim);
    margin-bottom: 6px;
  }

  /* high score table */
  #high-scores {
    margin-top: 32px;
    width: 520px;
    max-width: 92vw;
    text-align: left;
  }
  #high-scores h3 {
    font-size: 10px; letter-spacing: 0.25em;
    text-transform: uppercase; color: var(--dim);
    margin-bottom: 12px; text-align: center;
  }
  #scores-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 11px;
  }
  #scores-table th {
    color: var(--dim); font-weight: normal;
    letter-spacing: 0.1em; text-transform: uppercase;
    font-size: 10px; padding: 3px 6px 6px;
    border-bottom: 1px solid #222;
    text-align: right;
  }
  #scores-table th:first-child { text-align: left; }
  #scores-table td {
    padding: 5px 6px; color: var(--fg);
    border-bottom: 1px solid #161616;
    text-align: right;
  }
  #scores-table td:first-child { text-align: left; color: var(--dim); font-size: 10px; }
  #scores-table tr.current-run td { color: var(--accent); }
  #scores-table tr.current-run td:first-child { color: #777; }
  .outcome-won  { color: var(--fg); }
  .outcome-died { color: #444; }
</style>
</head>
<body>

<!-- TITLE SCREEN -->
<div id="title-screen">
  <h1>a text adventure</h1>
  <div class="subtitle">Werewolves</div>
  <div class="and">and</div>
  <div class="subtitle2">Wanderers</div>
  <button class="start-btn" onclick="startGame()">begin</button>
</div>

<!-- END SCREEN -->
<div id="end-screen">
  <div id="end-msg"></div>
  <div id="high-scores">
    <h3>── high scores ──</h3>
    <table id="scores-table">
      <thead>
        <tr>
          <th>date</th>
          <th>outcome</th>
          <th>score</th>
          <th>tally</th>
          <th>str</th>
          <th>wealth</th>
          <th>food</th>
          <th>kills</th>
        </tr>
      </thead>
      <tbody id="scores-body"></tbody>
    </table>
  </div>
  <button class="restart-btn" onclick="restartGame()">play again</button>
</div>

<!-- MAIN GAME -->
<div id="game">
  <!-- LOG -->
  <div id="log-panel">
    <div id="log-header">// werewolves and wanderers</div>
    <div id="log"></div>
  </div>

  <!-- SIDE PANEL -->
  <div id="side-panel">

    <!-- Room -->
    <div class="side-section">
      <h3>Location</h3>
      <div id="room-name">—</div>
      <!-- compass: N/S/E/W cross, then U/D below -->
      <div class="exits-grid" id="exits-grid">
        <div class="exit-cell"></div>
        <button class="exit-btn unavailable" id="btn-N" onclick="go('N')" title="North">N</button>
        <div class="exit-cell"></div>
        <button class="exit-btn unavailable" id="btn-W" onclick="go('W')" title="West">W</button>
        <div class="exit-cell" style="font-size:9px;color:#333;">✦</div>
        <button class="exit-btn unavailable" id="btn-E" onclick="go('E')" title="East">E</button>
        <div class="exit-cell"></div>
        <button class="exit-btn unavailable" id="btn-S" onclick="go('S')" title="South">S</button>
        <div class="exit-cell"></div>
      </div>
      <div style="display:flex;justify-content:center;gap:4px;margin-top:4px;">
        <button class="exit-btn unavailable" style="width:40px;" id="btn-U" onclick="go('U')" title="Up">U</button>
        <button class="exit-btn unavailable" style="width:40px;" id="btn-D" onclick="go('D')" title="Down">D</button>
      </div>
    </div>

    <!-- Map -->
    <div id="map-section">
      <h3>Map</h3>
      <div id="map-legend">■ current &nbsp; · visited &nbsp; ░ unseen</div>
      <div id="ascii-map"></div>
    </div>

    <!-- Stats -->
    <div class="side-section">
      <h3>Status</h3>
      <div class="stat-row">
        <span class="stat-label">strength</span>
        <span class="stat-value" id="stat-strength">—</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">wealth</span>
        <span class="stat-value" id="stat-wealth">—</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">food</span>
        <span class="stat-value" id="stat-food">—</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">tally</span>
        <span class="stat-value" id="stat-tally">—</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">monsters killed</span>
        <span class="stat-value" id="stat-mk">0</span>
      </div>
    </div>

    <!-- Inventory -->
    <div class="side-section">
      <h3>Carrying</h3>
      <div id="inventory-list"><span class="inv-empty">nothing.</span></div>
    </div>

    <!-- Actions -->
    <div class="side-section">
      <h3>Actions</h3>
      <button class="action-btn" id="btn-fight" onclick="doFight()">
        <span class="key">F</span>fight
      </button>
      <button class="action-btn" id="btn-run" onclick="doRun()">
        <span class="key">R</span>run (flee)
      </button>
      <button class="action-btn" id="btn-pickup" onclick="doPickup()">
        <span class="key">P</span>pick up treasure
      </button>
      <button class="action-btn" id="btn-eat" onclick="doEat()">
        <span class="key">C</span>consume food
      </button>
      <button class="action-btn" id="btn-magic" onclick="doMagic()">
        <span class="key">M</span>use magic amulet
      </button>
      <button class="action-btn" onclick="doShop()">
        <span class="key">I</span>provisions &amp; shop
      </button>
      <button class="action-btn" onclick="doTally()">
        <span class="key">T</span>tally score
      </button>
    </div>

  </div>
</div>

<!-- OVERLAY (name entry / shop / fight choices / eat) -->
<div id="overlay">
  <div id="overlay-box">
    <div id="overlay-title">—</div>
    <div id="overlay-body"></div>
    <div id="overlay-actions"></div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════
// GAME DATA — from BASIC source (Werewand.txt)
// ══════════════════════════════════════════════

// A(room, 1..7): 1=N, 2=S, 3=E, 4=W, 5=U, 6=D, 7=contents
// Stored as 0-indexed direction array [N,S,E,W,U,D] (contents handled separately)
const ROOMS = [
  null,                    // 1-indexed padding
  [0,2,0,0,0,0],          // room 1  hallway
  [1,3,3,0,0,0],          // room 2  audience chamber
  [2,0,5,2,0,0],          // room 3  great hall
  [0,5,0,0,0,0],          // room 4  monarch's meeting room
  [4,0,0,3,15,13],        // room 5  inner hallway
  [0,0,1,0,0,0],          // room 6  castle entrance (start)
  [0,8,0,0,0,0],          // room 7  kitchen
  [7,10,0,0,0,0],         // room 8  store room
  [0,19,0,0,0,8],         // room 9  lift
  [8,0,11,0,0,0],         // room 10 rear vestibule
  [0,0,10,0,0,0],         // room 11 EXIT — win room (empty per BASIC)
  [0,0,0,13,0,0],         // room 12 dungeon
  [0,0,12,0,5,0],         // room 13 guardroom
  [0,15,17,0,0,0],        // room 14 master bedroom
  [14,0,0,0,0,5],         // room 15 upper hallway
  [17,0,19,0,0,0],        // room 16 treasury
  [18,16,0,14,0,0],       // room 17 chambermaids' bedroom
  [0,17,0,0,0,0],         // room 18 dressing chamber
  [9,0,0,16,0,0],         // room 19 lift anteroom
];

const DIR_INDEX = {N:0, S:1, E:2, W:3, U:4, D:5};
const DIR_NAMES = ['north','south','east','west','up','down'];

const ROOM_NAMES = [
  null,
  'the hallway',
  'the audience chamber',
  'the great hall',
  "the monarch's meeting room",
  'the inner hallway',
  'the castle entrance',
  'the kitchen',
  'the store room',
  'the lift',
  'the rear vestibule',
  '— outside —',
  'the dark dungeon',
  'the prison guardroom',
  'the master bedroom',
  'the upper hallway',
  'the treasury',
  "the chambermaids' bedroom",
  'the dressing chamber',
  'the lift anteroom',
];

// Room descriptions — faithful to BASIC source
const ROOM_DESC = [
  null,
  // 1 hallway
  () => [
    "you are in the hallway.",
    "there is a door to the south.",
    "through windows to the north you can see a secret herb garden.",
  ],
  // 2 audience chamber
  () => [
    "this is the audience chamber.",
    "there is a window to the west. by looking to the right through it you can see the entrance to the castle.",
    "doors leave this room to the north, east and south.",
  ],
  // 3 great hall
  () => [
    "you are in the great hall, an L-shaped room.",
    "there are doors to the east and to the north.",
    "in the alcove is a door to the west.",
  ],
  // 4 monarch's meeting room
  () => [
    "this is the monarch's private meeting room.",
    "there is a single exit to the south.",
  ],
  // 5 inner hallway
  () => [
    "this inner hallway contains a door to the north, and one to the west, and a circular stairwell passes through the room.",
    "you can see an ornamental lake through the windows to the south.",
  ],
  // 6 entrance
  () => [
    "you are at the entrance to a forbidding-looking stone castle. you are facing east.",
  ],
  // 7 kitchen
  () => [
    "this is the castle's kitchen. through windows in the north wall you can see a secret herb garden.",
    "a door leaves the kitchen to the south.",
  ],
  // 8 store room
  () => [
    "you are in the store room, amidst spices, vegetables, and vast sacks of flour and other provisions.",
    "there is a door to the north and one to the south.",
  ],
  // 9 lift (handled specially in enterRoom)
  () => ["you have entered the lift..."],
  // 10 rear vestibule
  () => [
    "you are in the rear vestibule.",
    "there are windows to the south from which you can see the ornamental lake.",
    "there is an exit to the east and one to the north.",
  ],
  // 11 — empty, the exit (win condition triggered on entry)
  () => [],
  // 12 dungeon
  () => [
    "you are in the dank, dark dungeon.",
    "there is a single exit, a small hole in the wall towards the west.",
  ],
  // 13 guardroom
  () => [
    "you are in the prison guardroom, in the basement of the castle.",
    "the stairwell ends in this room. there is one other exit, a small hole in the east wall.",
  ],
  // 14 master bedroom
  () => [
    "you are in the master bedroom on the upper level of the castle....",
    "looking down from the window to the west you can see the entrance to the castle, while the secret herb garden is visible below the north window.",
    "there are doors to the east and to the south....",
  ],
  // 15 upper hallway
  () => [
    "this is the L-shaped upper hallway.",
    "to the north is a door, and there is a stairwell in the hall as well.",
    "you can see the lake through the south windows.",
  ],
  // 16 treasury
  () => [
    "this room was used as the castle treasury in by-gone years....",
    "there are no windows, just exits to the north and to the east.",
  ],
  // 17 chambermaids' bedroom
  () => [
    "ooooh... you are in the chambermaids' bedroom.",
    "there is an exit to the west and a door to the south....",
  ],
  // 18 dressing chamber
  () => [
    "this tiny room on the upper level is the dressing chamber.",
    "there is a window to the north, with a view of the herb garden down below.",
    "a door leaves to the south.",
  ],
  // 19 lift anteroom
  () => [
    "this is the small room outside the castle lift, which can be entered by a door to the north.",
    "another door leads to the west. you can see the lake through the southern windows.",
  ],
];

// Monsters: type -1..-4 per BASIC source
const MONSTERS = {
  '-1': ["Ferocious Werewolf",   5],
  '-2': ["Fanatical Fleshgorger",10],
  '-3': ["Maloventy Maldemer",   15],
  '-4': ["Devastating Ice-Dragon",20],
};

// ══════════════════════════════════════════════
// GAME STATE
// ══════════════════════════════════════════════
let G = {};

function initState() {
  // Values from BASIC lines 2620-2820
  G = {
    room: 6,          // RO=6 starting position
    strength: 100,    // STRENGTH=100
    wealth: 75,       // WEALTH=75
    food: 0,          // FOOD=0
    tally: 0,         // TALLY=0
    mk: 0,            // MK=0 monsters killed
    light: false,     // LIGHT=0
    axe: false,       // AXE=0
    sword: false,     // SWORD=0
    amulet: false,    // AMULET=0
    suit: false,      // SUIT=0
    roomContents: {}, // A(room,7) — positive=treasure value, negative=monster type
    visited: {},
    dead: false,
    won: false,
    inBattle: false,
  };

  // ALLOT TREASURE — 4 random rooms (lines 2850-2890)
  // Rooms 6 and 11 excluded; no double-allotting
  let treasureCount = 0;
  while (treasureCount < 4) {
    const m = Math.floor(Math.random() * 19) + 1;
    if (m === 6 || m === 11 || G.roomContents[m]) continue;
    G.roomContents[m] = Math.floor(Math.random() * 100) + 10; // $10-$109
    treasureCount++;
  }

  // ALLOT MONSTERS — 4 random rooms (lines 2920-2960)
  // Types -1 to -4; rooms 6 and 11 excluded; no double-allotting
  for (let j = 1; j <= 4; j++) {
    let m;
    do { m = Math.floor(Math.random() * 18) + 1; }
    while (m === 6 || m === 11 || G.roomContents[m]);
    G.roomContents[m] = -j;
  }

  // Fixed big treasures (lines 2970-2980)
  G.roomContents[4]  = 100 + Math.floor(Math.random() * 100); // meeting room $100-$199
  G.roomContents[16] = 100 + Math.floor(Math.random() * 100); // treasury $100-$199

  // Scavengeable food in kitchen (7) and store room (8) — 1 to 5 units each
  G.foodRooms = {
    7: Math.floor(Math.random() * 5) + 1,
    8: Math.floor(Math.random() * 5) + 1,
  };
}

// ══════════════════════════════════════════════
// LOG HELPERS
// ══════════════════════════════════════════════
function log(text, cls='', delay=0) {
  setTimeout(() => {
    const el = document.createElement('div');
    el.className = 'log-entry' + (cls ? ' '+cls : '');
    el.textContent = text;
    const logEl = document.getElementById('log');
    logEl.appendChild(el);
    logEl.scrollTop = logEl.scrollHeight;
  }, delay);
}

function logLines(lines, cls='', startDelay=0) {
  lines.forEach((l, i) => log(l, cls, startDelay + i * 70));
  return startDelay + lines.length * 70;
}

function logSep(delay=0) {
  log('────────────────────────────────────', 'separator', delay);
}

// UI UPDATE
// ══════════════════════════════════════════════
function updateStats() {
  const s = G.strength;
  const sEl = document.getElementById('stat-strength');
  sEl.textContent = s;
  sEl.className = 'stat-value' + (s < 10 ? ' critical' : s < 25 ? ' low' : '');

  document.getElementById('stat-wealth').textContent = '$' + G.wealth;
  document.getElementById('stat-food').textContent = G.food;
  document.getElementById('stat-tally').textContent = calcScore();
  document.getElementById('stat-mk').textContent = G.mk;
}

function updateInventory() {
  const items = [];
  if (G.light) items.push('flaming torch');
  if (G.axe)   items.push('axe');
  if (G.sword) items.push('sword');
  if (G.amulet)items.push('magic amulet');
  if (G.suit)  items.push('suit of armor');
  const el = document.getElementById('inventory-list');
  el.innerHTML = items.length === 0
    ? '<span class="inv-empty">nothing.</span>'
    : items.map(i => `<div class="inv-item">${i}</div>`).join('');
}

function updateExits() {
  const exits = ROOMS[G.room] || [];
  ['N','S','E','W','U','D'].forEach((d, i) => {
    const btn = document.getElementById('btn-'+d);
    if (!btn) return;
    const hasExit = exits[i] && exits[i] !== 0;
    btn.classList.toggle('unavailable', !hasExit);
  });
}

function updateRoomName() {
  document.getElementById('room-name').textContent = ROOM_NAMES[G.room] || '—';
}

function updateActionButtons() {
  const k = G.roomContents[G.room];
  const hasMonster  = k !== undefined && k < 0;
  // Treasure: original uses K>9 (value > 9) to distinguish from monsters
  const hasTreasure = k !== undefined && k > 9;
  const hasFood     = G.foodRooms && !!G.foodRooms[G.room];

  document.getElementById('btn-fight').disabled  = !hasMonster || G.inBattle;
  document.getElementById('btn-run').disabled    = !hasMonster || G.inBattle;
  document.getElementById('btn-pickup').disabled = !hasTreasure && !hasFood;
  document.getElementById('btn-eat').disabled    = G.food <= 0;
  document.getElementById('btn-magic').disabled  = !G.amulet;
}

// ══════════════════════════════════════════════
// ASCII MAP
// Each cell is 4 chars wide × 2 rows tall.
// Three floors stacked: UPPER / GROUND / BASEMENT
// Corridors drawn between adjacent cells.
// ══════════════════════════════════════════════
function renderMap() {
  const el = document.getElementById('ascii-map');
  if (!el) return;

  // Grid layout: [row, col] positions for each room (0-indexed)
  // Ground floor rows 3-6, Upper floor rows 0-2, Basement rows 7-9
  // Cols 0-8
  const POS = {
  //  room: [row, col]
     6: [5, 0],   // entrance
     1: [5, 2],   // hallway
     7: [3, 0],   // kitchen
     8: [4, 0],   // store room
     2: [4, 2],   // audience chamber
     3: [3, 2],   // great hall
     4: [2, 4],   // meeting room
     5: [4, 4],   // inner hallway
    10: [5, 4],   // rear vestibule
    11: [5, 6],   // exit
     9: [3, 4],   // lift
    19: [3, 6],   // lift anteroom
    16: [3, 8],   // treasury
    12: [6, 6],   // dungeon
    13: [6, 4],   // guardroom
    14: [1, 6],   // master bedroom
    15: [2, 6],   // upper hallway
    17: [1, 8],   // chambermaids' bedroom
    18: [0, 8],   // dressing chamber
  };

  const ROWS = 7;
  const COLS = 9;
  // Each grid cell = 4 chars wide, 2 rows tall in display
  // We'll build a char grid of (ROWS*2) × (COLS*4+1)
  const DH = ROWS * 2;    // display height
  const DW = COLS * 4 + 1; // display width

  // Init display grid with spaces
  const grid = Array.from({length: DH}, () => Array(DW).fill(' '));

  // Helper: write string at display position
  function write(dr, dc, str, cls) {
    for (let i = 0; i < str.length; i++) {
      if (dc + i < DW && dr < DH) {
        grid[dr][dc + i] = { ch: str[i], cls };
      }
    }
  }

  // States for rooms
  function roomState(r) {
    if (G.room === r) return 'current';
    if (G.visited[r]) return 'visited';
    return 'unvisited';
  }

  // Draw each room as a 3-char label in a [   ] box
  for (const [r, [row, col]] of Object.entries(POS)) {
    const id = parseInt(r);
    const dr = row * 2;
    const dc = col * 4;
    const state = roomState(id);
    const cls = state === 'current'   ? 'r-current'
               : state === 'visited'  ? 'r-visited'
               : 'r-unvisited';

    if (state === 'unvisited') {
      write(dr,   dc, '░░░', cls);
      write(dr+1, dc, '░░░', cls);
    } else {
      const label = id === 11 ? 'EXT' : String(id).padStart(2,' ');
      write(dr,   dc, '╔═╗', cls);
      write(dr+1, dc, `╚${label.length===2?label:label[0]+label[1]}╝`, cls);
    }
  }

  // Draw corridors between connected rooms
  // For each horizontal/vertical connection, draw a line between cells
  const CONNECTIONS = [
    // [roomA, roomB, direction] — 'h'=horizontal, 'v'=vertical
    [6,  1,  'h'],  // entrance — hallway
    [1,  2,  'v'],  // hallway — audience (south)
    [2,  3,  'v'],  // audience — great hall (south) — room2 S→3
    [2,  3,  'h'],  // audience — great hall (east) — room2 E→3 (same room, col+0 → col+0 since same col)
    [3,  5,  'h'],  // great hall — inner hallway
    [4,  5,  'v'],  // meeting room — inner hallway (south)
    [5, 10,  'v'],  // inner hallway — rear vestibule (south)
    [10, 11, 'h'],  // rear vestibule — exit
    [7,  8,  'v'],  // kitchen — store room
    [8,  2,  'h'],  // store room — audience chamber
    [8, 10,  'v'],  // store room — rear vestibule (south of 8 = 10)
    [9, 19,  'h'],  // lift — lift anteroom
    [19,16,  'h'],  // lift anteroom — treasury
    [9,  5,  'v'],  // lift — inner hallway (north of 5 = 9... row 3 vs row 4)
    [12, 13, 'h'],  // dungeon — guardroom
    [13,  5, 'stair'], // guardroom up to inner hallway
    [14, 15, 'v'],  // master bedroom — upper hallway (south)
    [15,  5, 'stair'], // upper hallway down to inner hallway
    [14, 17, 'h'],  // master bedroom — chambermaids
    [17, 18, 'v'],  // chambermaids — dressing chamber (north)
    [16, 17, 'v'],  // treasury — chambermaids (north of 17 = 16... row 3 vs row 1)
    [9,  8,  'stair'], // lift down to store room
    [5, 13,  'stair'], // inner hallway down to guardroom
    [15, 12, 'stair'], // upper hallway - dungeon connection via stairwell visual
  ];

  // Draw horizontal corridor between two horizontally adjacent rooms
  function drawH(r1, r2) {
    const [row1, col1] = POS[r1];
    const [row2, col2] = POS[r2];
    if (row1 !== row2) return;
    const minCol = Math.min(col1, col2);
    const maxCol = Math.max(col1, col2);
    const dr = row1 * 2 + 1; // corridor on bottom row of cell
    const vis = roomState(r1) !== 'unvisited' && roomState(r2) !== 'unvisited';
    const cls = vis ? 'r-conn-vis' : 'r-conn';
    for (let c = minCol + 1; c < maxCol; c++) {
      const dc = c * 4;
      write(dr, dc,   '───', cls);
    }
    // connectors on room edges
    if (vis) {
      const dc1 = (minCol) * 4 + 2;
      const dc2 = (maxCol) * 4;
      write(dr, dc1 + 1, '─', cls);
      write(dr, dc2 - 1, '─', cls);
    }
  }

  // Draw vertical corridor between two vertically adjacent rooms
  function drawV(r1, r2) {
    const [row1, col1] = POS[r1];
    const [row2, col2] = POS[r2];
    if (col1 !== col2) return;
    const minRow = Math.min(row1, row2);
    const maxRow = Math.max(row1, row2);
    const dc = col1 * 4 + 1; // corridor on second char of cell
    const vis = roomState(r1) !== 'unvisited' && roomState(r2) !== 'unvisited';
    const cls = vis ? 'r-conn-vis' : 'r-conn';
    for (let r = minRow + 1; r < maxRow; r++) {
      write(r * 2,     dc, '│', cls);
      write(r * 2 + 1, dc, '│', cls);
    }
    // Connect to room boxes
    if (vis) {
      write(minRow * 2 + 2, dc, '│', cls);
      write(maxRow * 2 - 1, dc, '│', cls);
    }
  }

  // Draw stairwell markers
  function drawStair(r1, r2) {
    const [row1, col1] = POS[r1];
    const vis = roomState(r1) !== 'unvisited';
    const cls = vis ? 'r-conn-vis' : 'r-conn';
    write(row1 * 2 + 1, col1 * 4 + 2, vis ? '↕' : ' ', cls);
  }

  for (const [r1, r2, type] of CONNECTIONS) {
    if (!POS[r1] || !POS[r2]) continue;
    if (type === 'h') drawH(r1, r2);
    else if (type === 'v') drawV(r1, r2);
    else if (type === 'stair') drawStair(r1, r2);
  }

  // Render to HTML with spans for colouring
  let html = '';
  for (let r = 0; r < DH; r++) {
    let rowHtml = '';
    let currentCls = null;
    let buf = '';
    for (let c = 0; c < DW; c++) {
      const cell = grid[r][c];
      const ch  = typeof cell === 'object' ? cell.ch  : cell;
      const cls = typeof cell === 'object' ? cell.cls : null;
      if (cls !== currentCls) {
        if (buf) rowHtml += currentCls ? `<span class="${currentCls}">${buf}</span>` : buf;
        buf = '';
        currentCls = cls;
      }
      buf += ch;
    }
    if (buf) rowHtml += currentCls ? `<span class="${currentCls}">${buf}</span>` : buf;
    html += rowHtml + '\n';
  }

  el.innerHTML = html;
}

function fullRefresh() {
  updateStats();
  updateInventory();
  updateExits();
  updateRoomName();
  updateActionButtons();
  renderMap();
}

  document.getElementById('overlay-actions').innerHTML = actionsHTML;

// ══════════════════════════════════════════════
// ROOM ENTRY  — mirrors BASIC's MAJOR HANDLING ROUTINE (line 160)
// ══════════════════════════════════════════════
function enterRoom(r) {
  G.room = r;
  const firstVisit = !G.visited[r];
  G.visited[r] = true;
  G.inBattle = false;

  // WIN: reaching room 11 (line 40: IF RO <> 11 THEN 30)
  if (r === 11) {
    setTimeout(() => triggerWin(), 400);
    fullRefresh();
    return;
  }

  // Strength decreases every turn (line 170: STRENGTH = STRENGTH - 5)
  G.strength -= 5;

  if (G.strength < 10 && G.strength > 0) {
    log(`warning — your strength is running low.`, 'alert');
  }
  if (G.strength < 1) {
    G.strength = 0;
    setTimeout(() => triggerDeath(), 600);
    fullRefresh();
    return;
  }

  // TALLY increments each turn (line 200)
  G.tally++;

  // Special: lift room 9
  if (r === 9) {
    logSep();
    log('you have entered the lift...', '');
    log('it slowly descends...', 'dim', 600);
    setTimeout(() => {
      G.room = 10;
      G.visited[10] = true;
      G.strength -= 5;
      G.tally++;
      logSep();
      describeRoom(10);
      fullRefresh();
    }, 1800);
    fullRefresh();
    return;
  }

  // Special first-visit message for room 1 — shown regardless of torch
  if (r === 1 && firstVisit) {
    logSep();
    log("the front door closes behind you with a loud bang that echoes through the castle.", 'alert');
    log("despite your best efforts it will not open again.", 'alert');
    log("looks like you'll need to find another exit.", 'dim');
  }

  logSep();
  describeRoom(r);
  fullRefresh();
}

function describeRoom(r) {
  // Without light, can't see anything (line 320)
  if (!G.light) {
    log("it is too dark to see anything.", 'dim');
    // Still show monster warnings based on contents
    const k = G.roomContents[r];
    if (k !== undefined && k < 0) {
      setTimeout(() => log("danger... there is a monster here....", 'danger'), 300);
    }
    return;
  }

  // Print room description (line 330 → GOSUB 990)
  const descFn = ROOM_DESC[r];
  if (descFn) {
    const lines = descFn();
    logLines(lines);
  }

  // Show room contents (lines 340-430)
  const k = G.roomContents[r];
  if (k !== undefined) {
    if (k > 9) {
      // Treasure (line 360: K>9)
      setTimeout(() => log(`there is treasure here worth $${k}.`, 'alert'), lines_delay(descFn));
    } else if (k < 0) {
      // Monster (lines 370-430)
      const mdata = MONSTERS[String(k)];
      if (mdata) {
        const d = lines_delay(descFn);
        setTimeout(() => {
          log('danger... there is a monster here....', 'danger');
          log(`it is a ${mdata[0].toLowerCase()}.`, 'danger', 120);
          log(`the danger level is ${mdata[1]}!!`, 'danger', 240);
        }, d);
      }
    }
  }

  // Show food hint for kitchen and store room
  const scavenge = G.foodRooms && G.foodRooms[r];
  if (scavenge) {
    setTimeout(() => log(`you spot ${scavenge} unit${scavenge > 1 ? 's' : ''} of food you could take.`, 'alert'), lines_delay(descFn) + 120);
  }
}

function lines_delay(descFn) {
  if (!descFn) return 200;
  try { return descFn().length * 70 + 200; } catch(e) { return 200; }
}

// ══════════════════════════════════════════════
// MOVEMENT
// ══════════════════════════════════════════════
function go(dir) {
  if (G.dead || G.won || G.inBattle) return;
  const idx = DIR_INDEX[dir];
  const exits = ROOMS[G.room];
  if (!exits || !exits[idx]) {
    const msgs = {
      N: "no exit that way.",
      S: "there is no exit south.",
      E: "you cannot go in that direction.",
      W: "you cannot move through solid stone.",
      U: "there is no way up from here.",
      D: "you cannot descend from here.",
    };
    log(msgs[dir] || "you cannot go that way.", 'dim');
    return;
  }
  // Must fight or flee if monster present (line 470)
  const k = G.roomContents[G.room];
  if (k !== undefined && k < 0) {
    log("you must fight or flee.", 'dim');
    return;
  }
  enterRoom(exits[idx]);
}

// ══════════════════════════════════════════════
// FIGHT — BASIC lines 730-970
// ══════════════════════════════════════════════
function doFight() {
  if (G.dead || G.won || G.inBattle) return;
  const k = G.roomContents[G.room];
  if (k === undefined || k >= 0) { log("there is nothing to fight here.", 'dim'); return; }

  const mdata = MONSTERS[String(k)];
  if (!mdata) return;
  let ff = mdata[1];

  // Armor modifier (line 770: FF = 3*(INT(FF/4)))
  if (G.suit) {
    ff = 3 * Math.floor(ff / 4);
    log("your armor increases your chance of success.", 'dim');
  }

  // Weapon selection (lines 790-850)
  if (!G.axe && !G.sword) {
    log("you have no weapons. you must fight with bare hands.", 'dim');
    ff = Math.floor(ff + ff / 5); // line 790
    runBattle(ff, mdata[0], k);
    return;
  }
  if (G.axe && !G.sword) {
    log("you have only an axe to fight with.", 'dim');
    ff = 4 * Math.floor(ff / 5); // line 800
    runBattle(ff, mdata[0], k);
    return;
  }
  if (!G.axe && G.sword) {
    log("you must fight with your sword.", 'dim');
    ff = 3 * Math.floor(ff / 4); // line 810
    runBattle(ff, mdata[0], k);
    return;
  }

  // Both weapons — ask (lines 820-850)
  showOverlay('choose weapon',
    `<p>you face the <strong>${mdata[0].toLowerCase()}</strong>.</p><p>danger level: ${ff}</p>`,
    `<button class="weapon-btn" onclick="hideOverlay();chooseFight(${k},${ff},'axe')">wield the axe</button>
     <button class="weapon-btn" onclick="hideOverlay();chooseFight(${k},${ff},'sword')">draw the sword</button>`
  );
}

function chooseFight(k, ff, weapon) {
  const mdata = MONSTERS[String(k)];
  if (weapon === 'axe')   ff = 4 * Math.floor(ff / 5);
  if (weapon === 'sword') ff = 3 * Math.floor(ff / 4);
  runBattle(ff, mdata[0], k);
}

// THE BATTLE — lines 870-970
// Original: repeated rounds; monster attacks/player attacks alternating;
// each round has random chance to wound either side;
// loop continues until RND(1)*16 > FF (player wins) or strength hits 0
function runBattle(ff, monsterName, roomKey) {
  G.inBattle = true;
  updateActionButtons();

  logSep();
  log('*_*_*_*_*_*_*_*_*_*_*_*_*_*_*_*_*_*_*_*', 'separator');

  const BATTLE_FLAVOUR = [
    `${monsterName.toLowerCase()} attacks!`,
    "you attack the monster!",
    "you manage to wound it.",
    "the monster wounds you!",
    "rip! tear! rip!",
    "you want to run, but you stand your ground...",
    "will this be a fight to the death?",
    "his eyes flash fearfully...",
    "blood drips from his claws...",
    "you smell sulfur on his breath...",
    "he strikes wildly, madly!",
    "you have never fought an opponent like this!!",
  ];

  let t = 100;
  let round = 0;
  const MAX_ROUNDS = 12;

  function battleRound() {
    if (G.strength < 1) {
      // Player died mid-battle
      log(`the ${monsterName.toLowerCase()} defeated you.`, 'danger', t);
      G.strength = Math.floor(G.strength / 2); // line 960
      setTimeout(() => triggerDeath(), t + 400);
      return;
    }

    round++;

    // Pick a flavour line (line 890: random attack direction)
    const flavour = BATTLE_FLAVOUR[Math.floor(Math.random() * BATTLE_FLAVOUR.length)];
    log(flavour, 'danger', t);
    t += 500;

    // Monster wounds player? (line 930: RND(1)>.5)
    if (Math.random() > 0.5) {
      G.strength -= 5;
      log(`the monster wounds you! strength: ${Math.max(0,G.strength)}.`, 'danger', t);
      t += 400;
      if (G.strength < 1) {
        G.strength = Math.floor(G.strength / 2);
        log(`the ${monsterName.toLowerCase()} defeated you.`, 'danger', t);
        setTimeout(() => triggerDeath(), t + 500);
        setTimeout(fullRefresh, t);
        return;
      }
    }

    // Player wounds monster? (line 910: RND(1)>.5 → reduce FF)
    if (Math.random() > 0.5) {
      ff = Math.floor(5 * ff / 6);
      log("you manage to wound it.", '', t);
      t += 400;
    }

    // Check for battle end (line 940: IF RND(1)>.35 THEN 890 — loop)
    // line 950: IF RND(1)*16>FF — player wins
    if (Math.random() > 0.35 && round < MAX_ROUNDS) {
      // Continue battle
      setTimeout(battleRound, t);
      setTimeout(fullRefresh, t);
    } else {
      // Resolve
      if (Math.random() * 16 > ff) {
        // Player wins (line 950)
        G.mk++;
        G.roomContents[G.room] = undefined;
        delete G.roomContents[G.room];
        log(`and you managed to kill the ${monsterName.toLowerCase()}!`, 'alert', t);
        log(`monsters killed: ${G.mk}`, 'dim', t + 100);
        // Ice dragon rewards the player with a magic amulet
        if (roomKey === -4 && !G.amulet) {
          G.amulet = true;
          log("as the ice dragon falls, a magic amulet rolls from its hoard to your feet.", 'alert', t + 250);
        }
      } else {
        // Monster wins (line 960)
        G.strength = Math.floor(G.strength / 2);
        log(`the ${monsterName.toLowerCase()} defeated you. strength halved.`, 'danger', t);
        if (G.strength < 1) {
          G.strength = 0;
          setTimeout(() => triggerDeath(), t + 500);
          setTimeout(fullRefresh, t);
          return;
        }
      }
      G.inBattle = false;
      setTimeout(fullRefresh, t + 200);
      logSep(t + 150);
    }
  }

  battleRound();
}

// ══════════════════════════════════════════════
// RUN / FLEE — lines 560-570, 2420-2460
// ══════════════════════════════════════════════
function doRun() {
  if (G.dead || G.won || G.inBattle) return;
  const k = G.roomContents[G.room];
  if (k === undefined || k >= 0) { log("what are you running from, the mice?", 'dim'); return; }

  // Line 560: IF RND(1)>.7 THEN 2420 — 30% chance forced to fight
  if (Math.random() > 0.7) {
    log("no! you must stand and fight!", 'danger');
    setTimeout(() => doFight(), 400);
    return;
  }

  // Ask which way to flee (line 570)
  const exits = ROOMS[G.room] || [];
  const available = ['N','S','E','W','U','D'].filter((d, i) => exits[i] && exits[i] !== 0);

  if (available.length === 0) {
    log("no! you must stand and fight!", 'danger');
    setTimeout(() => doFight(), 400);
    return;
  }

  const btns = available.map(d =>
    `<button class="weapon-btn" onclick="hideOverlay();fleeDir('${d}')">${DIR_NAMES[DIR_INDEX[d]]}</button>`
  ).join('');

  showOverlay('flee!',
    `<p>which way do you want to flee?</p>`,
    btns
  );
}

function fleeDir(dir) {
  const idx = DIR_INDEX[dir];
  const exits = ROOMS[G.room] || [];
  if (exits[idx]) {
    log("you flee!", 'dim');
    enterRoom(exits[idx]);
  }
}

// ══════════════════════════════════════════════
// PICK UP TREASURE / FOOD — lines 2350-2400
// ══════════════════════════════════════════════
function doPickup() {
  if (G.dead || G.won) return;

  // Check for scavengeable food first (rooms 7 and 8)
  const scavenge = G.foodRooms && G.foodRooms[G.room];
  if (scavenge) {
    G.food += scavenge;
    log(`you gather ${scavenge} unit${scavenge > 1 ? 's' : ''} of food. provisions: ${G.food}.`, 'alert');
    delete G.foodRooms[G.room];
    fullRefresh();
    return;
  }

  const k = G.roomContents[G.room];
  // Line 2360: K<10 means no treasure (treasure values are >9)
  if (k === undefined || k < 10) { log("there is no treasure to pick up.", 'dim'); return; }
  // Line 2370: need light to pick up
  if (!G.light) { log("you cannot see where it is.", 'dim'); return; }
  G.wealth += k;
  log(`you pick up the treasure. wealth is now $${G.wealth}.`, 'alert');
  delete G.roomContents[G.room];
  fullRefresh();
}

// ══════════════════════════════════════════════
// EAT FOOD — lines 2480-2580
// ══════════════════════════════════════════════
function doEat() {
  if (G.dead || G.won) return;
  if (G.food <= 0) { log("you have no food.", 'dim'); return; }

  showOverlay('consume food',
    `<p>you have ${G.food} units of food.</p>
     <p>how many do you want to eat?</p>
     <input class="overlay-input" id="eat-input" type="number" min="1" max="${G.food}" value="1">`,
    `<button class="overlay-btn" onclick="confirmEat()">eat</button>
     <button class="overlay-btn" onclick="hideOverlay()">cancel</button>`
  );
  setTimeout(() => document.getElementById('eat-input')?.focus(), 80);
}

function confirmEat() {
  const val = parseInt(document.getElementById('eat-input')?.value || 0);
  hideOverlay();
  if (!val || val <= 0) return;
  if (val > G.food) { log("that is more than you have.", 'dim'); return; }
  // Line 2550-2560: FOOD -= Z; STRENGTH += 5*Z
  G.food = Math.floor(G.food - val);
  G.strength = Math.floor(G.strength + 5 * val);
  log(`you eat ${val} unit${val>1?'s':''} of food. strength is now ${G.strength}.`, 'dim');
  fullRefresh();
}

// ══════════════════════════════════════════════
// MAGIC AMULET — line 630
// Teleports to random room 1-19, skipping 6 and 11
// ══════════════════════════════════════════════
function doMagic() {
  if (G.dead || G.won) return;
  if (!G.amulet) { log("you have no amulet.", 'dim'); return; }

  // Skip room 6 (entrance), 9 (lift, special-cased), 11 (win room)
  let dest;
  do { dest = Math.floor(Math.random() * 19) + 1; }
  while (dest === 6 || dest === 9 || dest === 11);

  // Set G.room immediately so all UI and input is in sync from this moment
  G.room = dest;
  G.visited[dest] = true;
  G.strength -= 5;
  G.tally++;
  log("the amulet flares with light... you are transported!", 'alert');
  fullRefresh();
  if (G.strength < 10 && G.strength > 0) {
    log("warning — your strength is running low.", 'alert');
  }
  if (G.strength < 1) {
    G.strength = 0;
    setTimeout(() => triggerDeath(), 600);
    return;
  }
  setTimeout(() => {
    logSep();
    describeRoom(dest);
    fullRefresh();
  }, 300);
}

// ══════════════════════════════════════════════
// SHOP / INVENTORY — lines 3010-3250
// ══════════════════════════════════════════════
function doShop() {
  if (G.dead || G.won) return;

  if (G.wealth < 1) {
    log("you have no money.", 'dim');
    return;
  }

  const items = [
    { key: 'light',  name: 'Flaming Torch',  cost: 15, own: G.light },
    { key: 'axe',    name: 'Axe',            cost: 10, own: G.axe },
    { key: 'sword',  name: 'Sword',          cost: 20, own: G.sword },
    { key: 'amulet', name: 'Magic Amulet',   cost: 30, own: G.amulet },
    { key: 'suit',   name: 'Suit of Armor',  cost: 50, own: G.suit },
  ];

  const rows = items.map(i => `
    <div class="shop-item ${i.own ? 'owned' : ''}"
         onclick="${i.own ? '' : `buyItem('${i.key}',${i.cost})`}">
      <span>${i.name}</span>
      <span class="price">${i.own ? 'owned' : '$'+i.cost}</span>
    </div>`).join('');

  const foodRow = `
    <div class="shop-item" onclick="buyFood()">
      <span>Food (per unit)</span>
      <span class="price">$2 / unit</span>
    </div>`;

  showOverlay('provisions & shop',
    `<p>you have <strong>$${G.wealth}</strong> &nbsp;·&nbsp; food: <strong>${G.food}</strong></p>
     <p style="margin:10px 0 4px;font-size:10px;color:var(--dim);letter-spacing:.15em">── items ──</p>
     ${rows}${foodRow}`,
    `<button class="overlay-btn" onclick="hideOverlay()">done</button>`
  );
}

function buyItem(key, cost) {
  if (G[key]) return;
  G[key] = true;
  G.wealth -= cost;
  // Line 3190: if wealth goes negative, punish cheating
  if (G.wealth < 0) {
    log("you have tried to cheat me!", 'danger');
    G.wealth = 0; G.suit = false; G.light = false;
    G.axe = false; G.sword = false; G.amulet = false;
    G.food = Math.floor(G.food / 4);
    hideOverlay(); fullRefresh(); return;
  }
  const names = {light:'flaming torch',axe:'axe',sword:'sword',amulet:'magic amulet',suit:'suit of armor'};
  log(`you purchase ${names[key]}. wealth: $${G.wealth}.`, 'dim');
  hideOverlay(); fullRefresh();
  if (key === 'light') {
    logSep();
    describeRoom(G.room);
  }
  doShop();
}

function buyFood() {
  showOverlay('buy food',
    `<p>$2 per unit. you have $${G.wealth}.</p>
     <p>how many units?</p>
     <input class="overlay-input" id="food-input" type="number" min="1" max="${Math.floor(G.wealth/2)}" value="5">`,
    `<button class="overlay-btn" onclick="confirmBuyFood()">buy</button>
     <button class="overlay-btn" onclick="doShop()">back</button>`
  );
  setTimeout(() => document.getElementById('food-input')?.focus(), 80);
}

function confirmBuyFood() {
  const q = Math.floor(parseInt(document.getElementById('food-input')?.value || 0));
  if (!q || q <= 0) { hideOverlay(); return; }
  // Line 3220: IF 2*Q > WEALTH — not enough money
  if (2 * q > G.wealth) {
    log("you haven't got enough money.", 'dim');
    hideOverlay(); return;
  }
  G.food += q;
  G.wealth -= 2 * q;
  hideOverlay();
  log(`you buy ${q} unit${q>1?'s':''} of food. wealth: $${G.wealth}.`, 'dim');
  fullRefresh();
}

// ══════════════════════════════════════════════
// SCORE & TALLY — line 130
// Score = 3*TALLY + 5*STRENGTH + 2*WEALTH + FOOD + 30*MK
// ══════════════════════════════════════════════
function calcScore() {
  return 3*G.tally + 5*G.strength + 2*G.wealth + G.food + 30*G.mk;
}

function doTally() {
  logSep();
  log(`your score is ${calcScore()}.`, 'alert');
  log(`  tally: ${G.tally}  strength: ${G.strength}  wealth: $${G.wealth}  food: ${G.food}  monsters: ${G.mk}`, 'dim');
}

// ══════════════════════════════════════════════
// HIGH SCORES — persisted in localStorage
// ══════════════════════════════════════════════
const HS_KEY = 'werewand_scores';
const HS_MAX = 10;

function loadScores() {
  try { return JSON.parse(localStorage.getItem(HS_KEY)) || []; }
  catch(e) { return []; }
}

function saveScore(outcome) {
  const entry = {
    date:     new Date().toLocaleDateString('en-GB', {day:'2-digit', month:'short', year:'numeric'}),
    outcome:  outcome,          // 'escaped' or 'died'
    score:    calcScore(),
    tally:    G.tally,
    strength: G.strength,
    wealth:   G.wealth,
    food:     G.food,
    mk:       G.mk,
  };
  const scores = loadScores();
  scores.push(entry);
  scores.sort((a,b) => b.score - a.score);
  scores.splice(HS_MAX); // keep top 10
  try { localStorage.setItem(HS_KEY, JSON.stringify(scores)); } catch(e) {}
  return entry;
}

function renderScores(currentEntry) {
  const scores = loadScores();
  const tbody = document.getElementById('scores-body');
  if (!scores.length) { tbody.innerHTML = '<tr><td colspan="8" style="color:#333;text-align:center;padding:12px">no scores yet.</td></tr>'; return; }
  tbody.innerHTML = scores.map(s => {
    const isCurrent = currentEntry &&
      s.date === currentEntry.date && s.score === currentEntry.score &&
      s.tally === currentEntry.tally && s.mk === currentEntry.mk;
    const outcomeHtml = s.outcome === 'escaped'
      ? `<span class="outcome-won">escaped</span>`
      : `<span class="outcome-died">died</span>`;
    return `<tr class="${isCurrent ? 'current-run' : ''}">
      <td>${s.date}</td>
      <td style="text-align:right">${outcomeHtml}</td>
      <td>${s.score}</td>
      <td>${s.tally}</td>
      <td>${s.strength}</td>
      <td>$${s.wealth}</td>
      <td>${s.food}</td>
      <td>${s.mk}</td>
    </tr>`;
  }).join('');
}

// ══════════════════════════════════════════════
// DEATH — lines 2300-2330
// ══════════════════════════════════════════════
function triggerDeath() {
  if (G.dead) return;
  G.dead = true;
  G.inBattle = false;
  fullRefresh();
  logSep();
  log("you have died.........", 'danger');
  setTimeout(() => {
    const entry = saveScore('died');
    document.getElementById('end-screen').classList.add('visible');
    document.getElementById('end-msg').innerHTML = `
      <div class="end-title">you have died.</div>
      <div style="color:var(--dim)">so sorry.</div>
      <div class="score" style="margin-top:16px">score: ${calcScore()}</div>
      <div style="margin-top:6px;font-size:11px;color:var(--dim)">
        tally: ${G.tally} &nbsp;·&nbsp; strength: ${G.strength} &nbsp;·&nbsp;
        wealth: $${G.wealth} &nbsp;·&nbsp; food: ${G.food} &nbsp;·&nbsp; monsters: ${G.mk}
      </div>`;
    renderScores(entry);
  }, 1200);
}

// ══════════════════════════════════════════════
// WIN — lines 50-140
// ══════════════════════════════════════════════
function triggerWin() {
  if (G.won) return;
  G.won = true;
  G.inBattle = false;
  fullRefresh();
  logSep();
  log("you've done it!!", 'big');
  log("that was the exit from the castle.", 'alert');
  log("you have succeeded!", 'alert');
  log("you managed to get out of the castle.", 'dim');
  log("well done!", 'dim');
  setTimeout(() => {
    const entry = saveScore('escaped');
    document.getElementById('end-screen').classList.add('visible');
    document.getElementById('end-msg').innerHTML = `
      <div class="end-title">you've done it!!</div>
      <div>that was the exit from the castle.</div>
      <div style="margin-top:6px">you managed to get out of the castle.</div>
      <div class="score" style="margin-top:16px">score: ${calcScore()}</div>
      <div style="margin-top:6px;font-size:11px;color:var(--dim)">
        tally: ${G.tally} &nbsp;·&nbsp; strength: ${G.strength} &nbsp;·&nbsp;
        wealth: $${G.wealth} &nbsp;·&nbsp; food: ${G.food} &nbsp;·&nbsp; monsters: ${G.mk}
      </div>`;
    renderScores(entry);
  }, 2500);
}

// ══════════════════════════════════════════════
// KEYBOARD
// ══════════════════════════════════════════════
document.addEventListener('keydown', e => {
  if (G.dead || G.won) return;
  if (document.getElementById('overlay').classList.contains('visible')) return;
  const k = e.key.toUpperCase();
  const map = {
    N: ()=>go('N'), S: ()=>go('S'), E: ()=>go('E'), W: ()=>go('W'),
    U: ()=>go('U'), D: ()=>go('D'),
    F: doFight, R: doRun, P: doPickup, C: doEat, M: doMagic,
    I: doShop, T: doTally,
    Q: () => { if (confirm('quit the castle?')) restartGame(); }
  };
  if (map[k]) { e.preventDefault(); map[k](); }
});

// ══════════════════════════════════════════════
// START / RESTART
// ══════════════════════════════════════════════
function startGame() {
  document.getElementById('title-screen').style.display = 'none';
  initState();

  log('werewolves and wanderers', 'big');

  setTimeout(() => {
    G.room = 6;
    G.visited[6] = true;
    G.tally++;
    logSep();
    describeRoom(6);
    fullRefresh();
  }, 700);
}

function restartGame() {
  document.getElementById('end-screen').classList.remove('visible');
  document.getElementById('log').innerHTML = '';
  hideOverlay();
  document.getElementById('title-screen').style.display = '';
}

// ══════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════
initState();
</script>
